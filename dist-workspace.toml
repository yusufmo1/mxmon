[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Publish the generated Homebrew formula to our tap (brew install yusufmo1/tap/mxmon)
tap = "yusufmo1/homebrew-tap"
publish-jobs = ["homebrew"]
# Target platforms to build apps for — Apple Silicon only (mxmon reads
# Apple-Silicon-specific private frameworks; nothing else is meaningful).
targets = ["aarch64-apple-darwin"]
